function StarRating({ value }) {
  const full = Math.floor(value);
  const half = value - full >= 0.5;
  return (
    <span style={{ display: 'inline-flex', gap: 2, alignItems: 'center' }}>
      {[1,2,3,4,5].map(i => (
        <svg key={i} width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M7 1l1.545 3.13 3.455.502-2.5 2.437.59 3.44L7 8.885 3.91 10.51l.59-3.44L2 4.632l3.455-.502z"
            fill={i <= full ? '#FF9500' : (i === full+1 && half ? 'url(#half)' : '#E5E5E5')}
          />
          <defs>
            <linearGradient id="half">
              <stop offset="50%" stopColor="#FF9500"/>
              <stop offset="50%" stopColor="#E5E5E5"/>
            </linearGradient>
          </defs>
        </svg>
      ))}
    </span>
  );
}

              </div>
            </div>

            <p style={{ fontSize: 17, color: '#444', lineHeight: 1.65, marginBottom: 28, maxWidth: 460 }}>{app.desc}</p>

            {/* Ratings row */}

              {app.rating_a && (
                <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                    <StarRating value={app.rating_a} />
                    <span style={{ fontWeight: 700, fontSize: 15 }}>{app.rating_a}</span>
                  </div>
                  <div style={{ fontSize: 11, color: '#999', fontWeight: 600, letterSpacing: '0.05em' }}>ANDROID</div>
                </div>
              )}
              {app.rating_i && (
                <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                    <StarRating value={app.rating_i} />
                    <span style={{ fontWeight: 700, fontSize: 15 }}>{app.rating_i}</span>
                  </div>
                  <div style={{ fontSize: 11, color: '#999', fontWeight: 600, letterSpacing: '0.05em' }}>IOS</div>
                </div>
              )}
              <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                <span style={{ fontWeight: 700, fontSize: 15 }}>{app.installs}</span>
                <div style={{ fontSize: 11, color: '#999', fontWeight: 600, letterSpacing: '0.05em' }}>INSTALLS</div>
              </div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                <span style={{ fontWeight: 700, fontSize: 15 }}>Free</span>
                <div style={{ fontSize: 11, color: '#999', fontWeight: 600, letterSpacing: '0.05em' }}>PRICE</div>
              </div>
            </div>

            {/* Store buttons */}
            <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap' }}>
              {app.platforms.includes('android') && (
                <a href="#" className="store-btn" style={{ background: '#1a1a1a', color: '#fff' }}>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M3.18 23.76c.26.15.56.17.83.08l11.65-11.65L12 8.53 3.18 23.76zM20.47 10.36l-2.53-1.45-3.35 3.35 3.35 3.35 2.54-1.46c.72-.42.72-1.38-.01-1.79zM2.01 1.46C1.99 1.6 2 1.74 2 1.89v20.22c0 .15.01.29.03.43L13.48 11.1 2.01 1.46zM15.66 2.17L4.01.09c-.27-.09-.57-.07-.83.08L12 8.53l3.66-6.36z"/>
                  </svg>
                  Google Play
                </a>
              )}
              {app.platforms.includes('ios') && (
                <a href="#" className="store-btn" style={{ background: '#fff', color: '#1a1a1a', border: '1.5px solid #e0e0e0' }}>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
                  </svg>
                  App Store
                </a>
              )}
            </div>
          </div>
        </div>

        {/* Features row */}
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 24, marginBottom: 48 }}>
          {app.features.map((f, i) => (
            <div key={i} style={{
              background: 'rgba(255,255,255,0.7)', borderRadius: 20,
              padding: '28px 24px',
              backdropFilter: 'blur(8px)',
              border: '1px solid rgba(255,255,255,0.9)',
            }}>
              <div style={{
                width: 44, height: 44, borderRadius: 12,
                background: `${app.color}22`,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                marginBottom: 14,
                fontSize: 22,
              }}>
                {['✦', '◈', '◉'][i]}
              </div>
              <div style={{ fontWeight: 800, fontSize: 15, marginBottom: 6 }}>{f.label}</div>
              <div style={{ fontSize: 13, color: '#666', lineHeight: 1.6, whiteSpace: 'pre-line' }}>{f.sub}</div>
            </div>
          ))}
        </div>

        {/* Reviews */}
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 16 }}>
          {app.reviews.map((r, i) => (
            <div key={i} style={{
              background: 'rgba(255,255,255,0.7)',
              borderRadius: 16, padding: '20px 22px',
              border: '1px solid rgba(255,255,255,0.9)',
            }}>
              <div style={{ fontWeight: 700, fontSize: 12, color: '#888', marginBottom: 8, display: 'flex', alignItems: 'center', gap: 8 }}>
                <StarRating value={5} />
                <span style={{ color: '#1a1a1a' }}>{r.name}</span>
              </div>
              <p style={{ fontSize: 13, color: '#444', lineHeight: 1.6 }}>{r.text}</p>
            </div>
          ))}
        </div>

      </div>
    </section>
  );
}

function Marquee() {
  const repeated = [...ALL_APPS, ...ALL_APPS];
  return (
    <div style={{ background: '#f9f9f9', borderTop: '1px solid #eee', borderBottom: '1px solid #eee', padding: '24px 0', overflow: 'hidden' }}>
      <div style={{ display: 'flex', gap: 20, animation: 'marquee 40s linear infinite', width: 'max-content' }}>
        {repeated.map((app, i) => (
          <div key={i} style={{
            width: 56, height: 56, borderRadius: 14, flexShrink: 0,
            background: `linear-gradient(135deg, ${app.color}33, ${app.color}66)`,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontSize: 28, border: `1px solid ${app.color}33`,
          }}>
            {app.icon}
          </div>
        ))}
      </div>
    </div>
  );
}

function MoreApps() {
  const [activeFilter, setActiveFilter] = useState('All');
  const cats = ['All', 'Fitness', 'Photo', 'PDF Tools', 'Utilities', 'Personalization', 'Productivity'];
  const filtered = activeFilter === 'All' ? ALL_APPS : ALL_APPS.filter(a => a.cat === activeFilter);

  return (
    <section style={{ background: '#fff', padding: '80px 0 80px' }}>
      <div style={{ maxWidth: 1120, margin: '0 auto', padding: '0 48px' }}>
        <h2 style={{ fontWeight: 800, fontSize: 36, marginBottom: 8 }}>All 46 Apps</h2>
        <p style={{ color: '#888', fontSize: 15, marginBottom: 36 }}>Every app is free to download. No trials, no limits.</p>

        {/* Filters */}
        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', marginBottom: 36 }}>
          {cats.map(c => (
            <button key={c} onClick={() => setActiveFilter(c)} style={{
              padding: '8px 18px', borderRadius: 100,
              fontFamily: 'Plus Jakarta Sans', fontWeight: 600, fontSize: 13,
              cursor: 'pointer', border: 'none',
              background: activeFilter === c ? '#1a1a1a' : '#f2f2f2',
              color: activeFilter === c ? '#fff' : '#555',
              transition: 'all 0.15s',
            }}>{c}</button>
          ))}
        </div>

        {/* Grid */}
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(200px, 1fr))', gap: 16 }}>
          {filtered.map(app => (
            <AppCard key={app.id} app={app} />
          ))}
        </div>
      </div>
    </section>
  );
}

function AppCard({ app }) {
  const [hov, setHov] = useState(false);
  return (
    <div
      onMouseEnter={() => setHov(true)}
      onMouseLeave={() => setHov(false)}
      style={{
        background: hov ? '#fafafa' : '#f7f7f7',
        border: `1.5px solid ${hov ? app.color + '66' : '#ebebeb'}`,
        borderRadius: 18, padding: '20px 18px',
        cursor: 'default',
        transition: 'all 0.2s',
        transform: hov ? 'translateY(-3px)' : 'none',
        boxShadow: hov ? `0 8px 28px ${app.color}18` : 'none',
      }}
    >
      <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 10 }}>
        <div style={{
          width: 44, height: 44, borderRadius: 12, flexShrink: 0,
          background: `linear-gradient(135deg, ${app.color}33, ${app.color}66)`,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontSize: 22,
        }}>{app.icon}</div>
        <div>
          <div style={{ fontWeight: 800, fontSize: 14 }}>{app.name}</div>
          <div style={{ fontSize: 11, color: '#999', fontWeight: 600 }}>{app.cat}</div>
        </div>
      </div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <div style={{ fontSize: 11, color: '#aaa' }}>{app.installs} installs</div>
        <div style={{ display: 'flex', gap: 4 }}>
          {app.platforms.map(p => (
            <span key={p} style={{
              fontSize: 9, fontWeight: 700,
              padding: '3px 7px', borderRadius: 5,
              background: p === 'android' ? '#e8f5e9' : '#e3f2fd',
              color: p === 'android' ? '#2e7d32' : '#1565c0',
            }}>{p === 'android' ? 'Android' : 'iOS'}</span>
          ))}
        </div>
      </div>
    </div>
  );
}

function Nav() {
  return (
    <nav style={{
      position: 'sticky', top: 0, zIndex: 200,
      background: 'rgba(255,255,255,0.92)', backdropFilter: 'blur(16px)',
      borderBottom: '1px solid #eee',
      padding: '0 48px', height: 60,
      display: 'flex', alignItems: 'center', justifyContent: 'space-between',
    }}>
      <div style={{ fontWeight: 800, fontSize: 20, letterSpacing: '-0.02em' }}>iStack</div>
      <div style={{ display: 'flex', gap: 32, alignItems: 'center' }}>
        <a href="#apps" style={{ fontSize: 14, fontWeight: 600, color: '#444', textDecoration: 'none' }}>All Apps</a>
        <a href="#" style={{
          fontSize: 13, fontWeight: 700, color: '#fff',
          background: '#1a1a1a', padding: '8px 18px',
          borderRadius: 10, textDecoration: 'none',
        }}>Google Play ↗</a>
      </div>
    </nav>
  );
}

function Hero() {
  return (
    <div style={{
      background: '#fff',
      padding: '96px 48px 80px',
      borderBottom: '1px solid #eee',
      textAlign: 'center',
    }}>
      <div style={{ maxWidth: 700, margin: '0 auto' }}>
        <div style={{
          display: 'inline-flex', alignItems: 'center', gap: 8,
          background: '#f3f4f6', borderRadius: 100,
          padding: '6px 16px', marginBottom: 28,
        }}>
          <div style={{ width: 7, height: 7, borderRadius: '50%', background: '#22c55e' }}/>
          <span style={{ fontSize: 12, fontWeight: 700, color: '#555', letterSpacing: '0.06em' }}>SOLO INDIE DEVELOPER · 46 FREE APPS</span>
        </div>

        <h1 style={{
          fontWeight: 800, fontSize: 'clamp(40px, 6vw, 72px)',
          lineHeight: 1.05, letterSpacing: '-0.03em', marginBottom: 24,
        }}>
          Portfolio of apps
        </h1>
        <p style={{ fontSize: 18, color: '#666', lineHeight: 1.65, marginBottom: 48, maxWidth: 500, margin: '0 auto 48px' }}>
          Small apps. Real jobs. No noise. Every app is free to download — no subscriptions, no trials, no dark patterns.
        </p>

        {/* Stats */}
        <div style={{ display: 'flex', justifyContent: 'center', gap: 0, flexWrap: 'wrap' }}>
          {[
            { n: '46', l: 'Free apps' },
            { n: '12M+', l: 'Total installs' },
            { n: '4.6★', l: 'Avg. rating' },
            { n: '6', l: 'Categories' },
          ].map((s, i) => (
            <div key={i} style={{
              padding: '20px 36px',
              borderLeft: i === 0 ? '1px solid #eee' : 'none',
              borderRight: '1px solid #eee',
              borderTop: '1px solid #eee',
              borderBottom: '1px solid #eee',
            }}>
              <div style={{ fontWeight: 800, fontSize: 28, letterSpacing: '-0.02em' }}>{s.n}</div>
              <div style={{ fontSize: 12, color: '#999', fontWeight: 600, marginTop: 2 }}>{s.l}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function App() {
  return (
    <div>
      <Nav />
      <Hero />
      <Marquee />
      {FEATURED.map((app, i) => <AppSection key={app.id} app={app} index={i} />)}
      <Marquee />
      <div id="apps"><MoreApps /></div>
      <footer style={{
        background: '#f9f9f9', borderTop: '1px solid #eee',
        padding: '48px', textAlign: 'center',
      }}>
        <div style={{ fontWeight: 800, fontSize: 22, marginBottom: 8 }}>iStack</div>
        <p style={{ fontSize: 13, color: '#999' }}>Built by one person. Used by millions. All apps free, forever.</p>
        <p style={{ fontSize: 12, color: '#bbb', marginTop: 24 }}>© 2019–2026 iStack</p>
      </footer>

      <TweaksPanel />
    </div>
  );
}

// ─── TWEAKS ───────────────────────────────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#1a1a1a",
  "navStyle": "light"
}/*EDITMODE-END*/;

function TweaksPanel() {
  const [visible, setVisible] = useState(false);
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);

  useEffect(() => {
    window.addEventListener('message', e => {
      if (e.data?.type === '__activate_edit_mode') setVisible(true);
      if (e.data?.type === '__deactivate_edit_mode') setVisible(false);
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
  }, []);

  if (!visible) return null;

  return (
    <div style={{
      position: 'fixed', bottom: 24, right: 24, zIndex: 9000,
      background: '#fff', border: '1px solid #e5e5e5',
      borderRadius: 16, padding: 20, width: 220,
      boxShadow: '0 20px 60px rgba(0,0,0,0.12)',
    }}>
      <div style={{ fontWeight: 800, fontSize: 13, marginBottom: 14, color: '#1a1a1a' }}>Tweaks</div>
      <div style={{ fontSize: 10, fontWeight: 700, color: '#999', marginBottom: 8, letterSpacing: '0.08em' }}>NAV ACCENT</div>
      <div style={{ display: 'flex', gap: 8 }}>
        {['#1a1a1a', '#ef4444', '#3b82f6', '#22c55e', '#8b5cf6'].map(c => (
          <button key={c} onClick={() => {
            const next = { ...tweaks, accentColor: c };
            setTweaks(next);
            window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
          }} style={{
            width: 28, height: 28, borderRadius: 8, background: c,
            border: tweaks.accentColor === c ? '3px solid #fff' : '2px solid transparent',
            outline: tweaks.accentColor === c ? `2px solid ${c}` : 'none',
            cursor: 'pointer',
          }}/>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

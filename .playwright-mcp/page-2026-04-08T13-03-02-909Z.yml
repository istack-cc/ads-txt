          - generic [ref=e135]:
            - generic [ref=e136]:
              - text: 💪 Build real muscle, burn fat, and transform your body — no gym membership, no equipment, no excuses.
              - text: "Home Workout: Muscle Booster is a complete bodyweight training app that guides you through every rep, set, and rest period from the comfort of your home. Whether you're a complete beginner or an experienced athlete, the structured workout plans adapt to your fitness level so you can start building strength from day one."
              - text: 🏋️ 500+ Exercises for Every Muscle Group
              - text: "Browse a massive exercise library with animated demonstrations covering:"
              - text: • Abs workouts and core training for a defined midsection
              - text: • Chest workouts and push variations to build upper body strength
              - text: • Arm workouts — biceps, triceps, and forearm exercises
              - text: • Leg workouts — squats, lunges, glutes, and calves
              - text: • Back workouts and shoulder routines for a balanced physique
              - text: • Full body workouts for total conditioning and fat burning
              - text: Every exercise includes clear animated guidance so you always know exactly how to perform each movement safely and effectively.
              - text: 📅 Structured Workout Plans That Deliver Results
              - text: "Stop guessing what to do next. Choose from a library of multi-day and multi-week workout programs designed for specific goals:"
              - text: • Muscle building and hypertrophy plans for strength gains
              - text: • Fat burning and body transformation programs
              - text: • Beginner fitness routines for a smooth, injury-free start
              - text: • Advanced bodyweight and calisthenics programs
              - text: Each plan is structured to deliver measurable results without a single piece of gym equipment. Train at your own pace, follow the program, and track your transformation week by week.
              - text: ⏱ Fully Guided Workout Sessions
              - text: Every session is guided with a smart workout timer and rep counter. The built-in rest timer handles your rest periods automatically — just follow the session and let the app pace your training. A session progress bar keeps you on track, while session controls let you pause, skip, or navigate freely between exercises.
              - text: 🎯 Build Your Own Custom Workouts
              - text: Not finding the exact routine you need? Build your own. Use the custom workout creator to select exercises from the full library and assemble a personalized routine that perfectly matches your training style, available time, and target muscle groups.
              - text: 📊 Progress Tracking That Actually Motivates
              - text: "Your fitness transformation is visible in real time:"
              - text: • Total workouts completed and active training minutes logged
              - text: • Workout streak tracker to build and maintain a daily exercise habit
              - text: • Weight tracking chart with easy body weight entry and trend visualization
              - text: • Session history with detailed logs for reviewing past performance
              - text: • Fitness statistics summary covering all your training over time
              - text: Your home screen displays today's workout card and a quick-access row for your most popular workout plans — getting to your workout takes seconds, not minutes. Stay motivated with streak banners and recent activity cards that celebrate your consistency.
              - text: 🔥 Train Anywhere, Anytime — No Equipment Required
              - text: Home workout or outdoor training session — this app works wherever you do. No internet required after setup, no gym membership needed, no equipment necessary. Just open the app, start your session, and build the body you want with effective bodyweight training.
              - text: Every exercise in the library is designed to be performed with only your bodyweight, making this the perfect workout companion for travel, home, small spaces, or whenever the gym isn't an option.
              - text: Start your fitness journey today. Your first workout is one tap away.
